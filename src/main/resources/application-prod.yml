spring:
  datasource:
    url: jdbc:mysql://discord-mysql:3306/discord_server?serverTimezone=Asia/Seoul
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    database-platform: org.hibernate.dialect.MySQL8Dialect
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: false

  data:
    redis:
      host: discord-redis
      port: 6379

jwt:
  accessSecret: ${JWT_ACCESS_SECRET}
  refreshSecret: ${JWT_REFRESH_SECRET}
  access_token_expired_at: 10800000
  refresh_token_expired_at: 604800000

server:
  port: 8080

logging:
  level:
    root: info
