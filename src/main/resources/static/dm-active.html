<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>📥 DM 창 활성 상태 테스트</title>
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
</head>
<body>
<h1>📥 이 유저는 현재 DM 창 안에 있습니다</h1>
<ul id="log-list"></ul>

<script>
    const token = "eyJhbGciOiJIUzI1NiJ9.eyJzdWIiOiI3IiwiZW1haWwiOiJsd2I5MDM2Iiwicm9sZSI6IlVTRVIiLCJpYXQiOjE3NDgwODYxMDksImV4cCI6MTc0ODA5NjkwOX0.ZmFVKbY-z-9HQxG0TIQ5MGYUIE4X-uh7IFdfbna2A0g"; // userId = 7
    const dmId = "12345678"; // 테스트할 DM ID
    const socket = new SockJS(`http://localhost:8080/ws-chat?token=${token}`);
    const stomp = Stomp.over(socket);

    stomp.connect({}, () => {
        console.log("✅ WebSocket 연결됨 (DM 열람 상태)");
        log("✅ WebSocket 연결됨");

        // ✅ 해당 사용자가 현재 DM 창을 열람 중임을 알리기 위한 메시지 전송
        stomp.send(`/app/dm/${dmId}/enter`, {}, JSON.stringify({}));

        // 알림 큐 구독
        stomp.subscribe("/user/queue/notifications", (msg) => {
            const data = JSON.parse(msg.body);
            log(`📩 수신된 알림: ${JSON.stringify(data)}`);
        });
    });

    function log(text) {
        const li = document.createElement("li");
        li.innerText = text;
        document.getElementById("log-list").appendChild(li);
    }
</script>
</body>
</html>
